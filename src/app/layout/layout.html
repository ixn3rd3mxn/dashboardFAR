<div class="shell" [class.sidebar-collapsed]="!sidebarOpen()">
  <!-- Backdrop (mobile only, via CSS) -->
  <div
    class="sidebar-backdrop"
    [class.visible]="sidebarOpen()"
    (click)="toggleSidebar()"
    aria-hidden="true"
  ></div>

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="sidebarOpen()" aria-label="เมนูหลัก">
    <!-- Header -->
    <div class="sidebar-top">
      <svg
        class="brand-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        aria-hidden="true"
      >
        <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke-linejoin="round" />
        <path d="M2 17L12 22L22 17" stroke-linejoin="round" />
        <path d="M2 12L12 17L22 12" stroke-linejoin="round" />
      </svg>
      @if (sidebarOpen()) {
        <div class="brand-text">
          <span class="brand-name">ศูนย์รับแจ้งเหตุฯ ปัตตานี</span>
        </div>
      }
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav" aria-label="การนำทาง">
      <a
        routerLink="/home"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="activeOptions"
        class="nav-item"
        title="หน้าหลัก"
      >
        <svg
          class="nav-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span class="nav-label">หน้าหลัก</span>
      </a>

      <!-- Group: รายงานรับแจ้งเหตุ -->
      <div class="nav-group-label" aria-hidden="true">รายงานรับแจ้งเหตุ</div>

      <a
        routerLink="/incident/dashboard"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="activeOptions"
        class="nav-item nav-child"
        title="แดชบอร์ด"
      >
        <svg
          class="nav-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        <span class="nav-label">แดชบอร์ด</span>
      </a>

      <a
        routerLink="/incident/summary"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="activeOptions"
        class="nav-item nav-child"
        title="สรุปผล"
      >
        <svg
          class="nav-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        <span class="nav-label">สรุปผล</span>
      </a>

      <a
        routerLink="/incident/edit"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="activeOptions"
        class="nav-item nav-child"
        title="จัดการข้อมูล"
      >
        <svg
          class="nav-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        <span class="nav-label">จัดการข้อมูล</span>
      </a>

      <!-- Group: รวมหน่วยกู้ชีพ -->
      <div class="nav-group-label" aria-hidden="true">รวมหน่วยกู้ชีพ</div>

      <a
        routerLink="/rescue/map"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="activeOptions"
        class="nav-item nav-child"
        title="แผนที่"
      >
        <svg
          class="nav-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" />
          <line x1="8" y1="2" x2="8" y2="18" />
          <line x1="16" y1="6" x2="16" y2="22" />
        </svg>
        <span class="nav-label">แผนที่</span>
      </a>

      <a
        routerLink="/rescue/summary"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="activeOptions"
        class="nav-item nav-child"
        title="สรุปผล"
      >
        <svg
          class="nav-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        <span class="nav-label">สรุปผล</span>
      </a>

      <a
        routerLink="/rescue/edit"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="activeOptions"
        class="nav-item nav-child"
        title="จัดการข้อมูล"
      >
        <svg
          class="nav-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
        </svg>
        <span class="nav-label">จัดการข้อมูล</span>
      </a>
    </nav>

    <!-- Footer: toggle button -->
    <div class="sidebar-footer">
      <button
        class="sidebar-toggle-btn"
        (click)="toggleSidebar()"
        [attr.aria-label]="sidebarOpen() ? 'ย่อเมนู' : 'ขยายเมนู'"
        type="button"
      >
        @if (sidebarOpen()) {
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            aria-hidden="true"
          >
            <polyline points="15 18 9 12 15 6" />
            <polyline points="9 18 3 12 9 6" />
          </svg>
          <span class="nav-label">ย่อเมนู</span>
        } @else {
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            aria-hidden="true"
          >
            <polyline points="9 18 15 12 9 6" />
            <polyline points="15 18 21 12 15 6" />
          </svg>
        }
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main-area">
    <!-- Mobile: floating open button when sidebar is closed -->
    @if (!sidebarOpen()) {
      <button
        class="sidebar-open-btn"
        (click)="toggleSidebar()"
        aria-label="เปิดเมนู"
        type="button"
      >
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          aria-hidden="true"
        >
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
    }
    <router-outlet />
  </div>
</div>
